<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vườn ươm hạnh phúc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --cyber-cyan: #00f2ff; --gold-text: #f1c40f; --bg-dark: #000; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* Navigation */
        .nav-tabs { background: #000; border: none; padding: 5px 10px 0; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .nav-link { color: #666; border: none !important; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; padding: 12px 20px; font-family: 'Orbitron', sans-serif; }
        .nav-link.active { background: var(--cyber-cyan) !important; color: #000 !important; box-shadow: 0 -5px 20px rgba(0, 242, 255, 0.4); }

        /* Workspace & Responsive */
        .main-wrapper { display: flex; flex-direction: row; height: calc(100vh - 55px); }
        
        /* Điện thoại cầm đứng (Portrait): Xếp dọc */
        @media (max-width: 992px) and (orientation: portrait) {
            .main-wrapper { flex-direction: column; height: auto; }
            .sidebar { width: 100% !important; border-right: none !important; border-bottom: 1px solid #222; }
            .preview-area { min-height: 450px; padding: 10px; }
        }

        /* Điện thoại xoay ngang (Landscape): Chia đôi như máy tính */
        @media (orientation: landscape) and (max-height: 500px) {
            .sidebar { width: 300px !important; padding: 10px 20px !important; }
            .group-label { margin-top: 8px !important; margin-bottom: 5px !important; font-size: 0.65rem !important; }
            .form-control { font-size: 0.75rem !important; margin-bottom: 5px !important; }
            label { font-size: 0.6rem !important; }
            .btn-action { padding: 8px !important; font-size: 0.75rem !important; }
        }

        .sidebar { width: 340px; background: #111; padding: 20px; overflow-y: auto; border-right: 1px solid #222; flex-shrink: 0; }
        .preview-area { flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #previewImg { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.9); border-radius: 8px; border: 1px solid #333; }

        .group-label { color: var(--cyber-cyan); font-weight: bold; text-transform: uppercase; font-size: 0.75rem; margin-top: 15px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; letter-spacing: 1px; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: white; font-size: 0.85rem; margin-bottom: 10px; }
        label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 3px; }
        input[type=range] { width: 100%; accent-color: var(--cyber-cyan); margin-bottom: 12px; }

        .btn-action { font-weight: bold; padding: 12px; border-radius: 4px; border: none; width: 100%; margin-top: 10px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-garden { background: linear-gradient(45deg, #0066ff, var(--cyber-cyan)); color: #fff; }
        .btn-save { background: #222; color: #888; }

        /* Vườn Ươm */
        .garden-container { padding: 40px; min-height: 100%; }
        .garden-header-box { border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 15px; padding: 30px; margin-bottom: 30px; background: rgba(0, 242, 255, 0.03); }
        .garden-stats h2 { font-family: 'Orbitron', sans-serif; color: var(--cyber-cyan); text-shadow: 0 0 15px var(--cyber-cyan); }
        .garden-divider { height: 2px; background: linear-gradient(90deg, transparent, var(--cyber-cyan), transparent); margin: 20px auto 40px; width: 80%; }
        .garden-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 40px 20px; justify-items: center; }
        .tech-node { width: 160px; position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; padding-top: 20px; }
        .mam-xanh-img { width: 90px; height: 90px; object-fit: contain; position: relative; z-index: 1; }
        
        @keyframes slowGrowth { 0% { transform: scale(0) translateY(50px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes neonPulse { 0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5)); } 50% { filter: drop-shadow(0 0 25px rgba(0, 242, 255, 0.8)); } }
        .growing-anim { animation: slowGrowth 2s forwards; }
        .tech-node .mam-xanh-img { animation: neonPulse 4s infinite ease-in-out; }
        .node-name { margin-top: 15px; font-weight: 700; color: #fff; font-size: 0.85rem; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .node-role { font-size: 0.7rem; color: var(--gold-text); font-style: italic; }

        /* Modal & Nút tải gọn đẹp */
        #modalImg { max-width: 95%; max-height: 85vh; object-fit: contain; border: 1px solid rgba(0, 242, 255, 0.5); }
        .modal-download-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: var(--cyber-cyan);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            text-decoration: none !important;
            box-shadow: 0 0 15px var(--cyber-cyan);
            transition: 0.3s;
            z-index: 9999;
        }
        .modal-download-btn:hover { transform: scale(1.1); filter: brightness(1.2); color: #000; }
        
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loading">
    <div class="spinner-border text-info" style="width: 4rem; height: 4rem;"></div>
    <div class="mt-4 text-info fw-bold" style="font-family: 'Orbitron';">ĐANG GIEO THÔNG ĐIỆP...</div>
</div>

<ul class="nav nav-tabs" id="myTab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#edit-pane">Tạo Thông Điệp</button></li>
    <li class="nav-item"><button class="nav-link" id="garden-tab-btn" data-bs-toggle="tab" data-bs-target="#garden-pane">Vườn Thông Điệp</button></li>
</ul>

<div class="tab-content">
    <div class="tab-pane fade show active" id="edit-pane">
        <div class="main-wrapper">
            <div class="sidebar">
                <div class="group-label">0. Ảnh Chân Dung</div>
                <input class="form-control mb-2" type="file" id="uploadAvatar" accept="image/*">
                <label>Trái / Phải:</label><input type="range" id="avtX" min="-300" max="300" value="0">
                <label>Lên / Xuống:</label><input type="range" id="avtY" min="-300" max="300" value="0">
                <label>Kích thước:</label><input type="range" id="avtScale" min="0.1" max="2.0" step="0.01" value="0.55">

                <div class="group-label">1. Người Gửi</div>
                <input type="text" id="inpSender" class="form-control" placeholder="Họ tên người gửi">
                <input type="text" id="inpSenderRole" class="form-control" placeholder="Xưng hô / Chức vụ">
                <input type="text" id="inpProvince" class="form-control" placeholder="Địa phương">

                <div class="group-label">2. Người Nhận</div>
                <input type="text" id="inpReceiver" class="form-control" placeholder="Họ tên người nhận">
                
                <div class="group-label">3. Nội dung</div>
                <textarea id="inpMessage" class="form-control" rows="3" placeholder="Nhập lời yêu thương..."></textarea>
                
                <div class="group-label">4. Căn chỉnh</div>
                <label>Dọc lời nhắn:</label><input type="range" id="msgY" min="-300" max="300" value="0">
                <label>Ngang lời nhắn:</label><input type="range" id="msgXOffset" min="-500" max="500" value="0">
                <label>Cỡ chữ lời nhắn:</label><input type="range" id="msgSize" min="20" max="80" value="34">
                
                <button onclick="addToGarden()" class="btn-action btn-garden">Gieo thông điệp</button>
                <button onclick="downloadImage()" class="btn-action btn-save">Lưu về máy</button>
            </div>
            <div class="preview-area"><img id="previewImg" src=""></div>
        </div>
    </div>

    <div class="tab-pane fade" id="garden-pane">
        <div class="garden-container text-center">
            <div class="garden-header-box">
                <div class="garden-stats">
                    <h2>VƯỜN ƯƠM MẦM HẠNH PHÚC</h2>
                    <div class="mt-3">
                        <span style="color: #888;">Hiện có </span>
                        <b id="treeCount" style="font-size: 3rem; color: #fff; text-shadow: 0 0 15px var(--cyber-cyan);">0</b> 
                        <span style="color: var(--cyber-cyan);"> mầm xanh</span>
                    </div>
                </div>
            </div>
            <div class="garden-divider"></div>
            <div class="garden-grid" id="gardenGrid"></div>
        </div>
    </div>
</div>

<!-- Modal Full Ảnh - Click bất kỳ đâu để tắt -->
<div class="modal fade" id="treeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content bg-black">
            <!-- Thêm data-bs-dismiss="modal" vào body để click là đóng -->
            <div class="modal-body p-0 d-flex align-items-center justify-content-center position-relative" data-bs-dismiss="modal" style="cursor: pointer;">
                <img id="modalImg" src="">
                <!-- Nút tải riêng biệt, click ko bị đóng modal -->
                <a href="javascript:void(0)" id="modalDownloadBtn" class="modal-download-btn" title="Tải ảnh về máy">
                    <i class="bi bi-download"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<canvas id="mainCanvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdwj6-9ZXXIKfdMrnl2Zq-nuQryIDE7lTCy8Tm_0_tUgeGqKsa9ut-Dp-cDgSwY1-sdQ/exec"; 
    const BG_URL = "https://lh3.googleusercontent.com/d/1U5i0S7BvhH9sp6tK3R_qqtnJIX6g3haI";
    const LOGO_CAY = "https://lh3.googleusercontent.com/d/12K8BTkKCDnh9RxYcYyx7zmfZePJJVx2s";

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const previewImg = document.getElementById('previewImg');
    let bgImg = new Image();
    let userAvatar = new Image();
    let isAvatarLoaded = false;
    let gardenData = []; 
    let lastTotal = 0;

    window.onload = () => {
        bgImg.crossOrigin = "anonymous";
        bgImg.src = BG_URL;
        bgImg.onload = () => { canvas.width = bgImg.width; canvas.height = bgImg.height; update(); };
        initLoadData();
        setInterval(autoSyncData, 8000); 
    };

    document.getElementById('uploadAvatar').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            userAvatar = new Image();
            userAvatar.onload = () => { isAvatarLoaded = true; update(); };
            userAvatar.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function update() {
        if(!bgImg.complete) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (isAvatarLoaded) {
            ctx.save();
            const avtX = parseInt(document.getElementById('avtX').value);
            const avtY = parseInt(document.getElementById('avtY').value);
            const scale = parseFloat(document.getElementById('avtScale').value);
            const w = userAvatar.width * scale;
            const h = userAvatar.height * scale;
            ctx.drawImage(userAvatar, 245 + avtX - w/2, 460 + avtY - h/2, w, h);
            ctx.restore();
        }
        ctx.drawImage(bgImg, 0, 0);
        drawProjectContent();
        previewImg.src = canvas.toDataURL('image/jpeg', 0.85);
    }

    function drawProjectContent() {
        const sender = (document.getElementById('inpSender').value || "Người gửi").toUpperCase();
        const sRole = document.getElementById('inpSenderRole').value || "";
        const receiver = document.getElementById('inpReceiver').value || "Người nhận";
        const province = document.getElementById('inpProvince').value || "Địa phương";
        const message = document.getElementById('inpMessage').value || "Nhập lời yêu thương...";
        const msgSize = parseInt(document.getElementById('msgSize').value);
        const msgY = 519 + parseInt(document.getElementById('msgY').value);
        const msgX = 535 + parseInt(document.getElementById('msgXOffset').value);

        ctx.textAlign = "center"; 
        ctx.fillStyle = "#05321e";
        ctx.font = "bold 22px 'Montserrat'";
        ctx.fillText(sender, 267, 619); 
        ctx.fillStyle = "#666";
        ctx.font = "italic 400 22px 'Montserrat'"; 
        ctx.fillText(sRole, 260, 680); 
        ctx.fillText(province, 264, 717); 

        ctx.textAlign = "left";
        ctx.fillStyle = "#05321e";
        ctx.font = "40px 'Dancing Script'";
        ctx.fillText(receiver, 651, 459); 

        ctx.fillStyle = "#333"; 
        ctx.font = `${msgSize}px 'Dancing Script'`;
        justifyText(ctx, message, msgX, msgY, 730, msgSize * 1.4);
    }

    function justifyText(context, text, x, y, maxWidth, lineHeight) {
        const indent = 50; 
        let words = text.split(' ');
        let lines = [];
        let currentLine = [];
        for (let n = 0; n < words.length; n++) {
            let testLine = [...currentLine, words[n]].join(' ');
            let testWidth = context.measureText(testLine).width + (lines.length === 0 ? indent : 0);
            if (testWidth > maxWidth && currentLine.length > 0) {
                lines.push(currentLine);
                currentLine = [words[n]];
            } else {
                currentLine.push(words[n]);
            }
        }
        lines.push(currentLine);
        lines.forEach((lineWords, index) => {
            let lineY = y + (index * lineHeight);
            context.fillText(lineWords.join(' '), x + (index === 0 ? indent : 0), lineY);
        });
    }

    async function initLoadData() {
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL);
            const data = await res.json();
            gardenData = data.items.slice().reverse();
            lastTotal = data.total;
            document.getElementById('treeCount').innerText = lastTotal;
            renderGarden();
        } catch (e) {}
    }

    function renderGarden() {
        const grid = document.getElementById('gardenGrid');
        if(!grid) return;
        grid.innerHTML = "";
        gardenData.forEach((item) => {
            const div = document.createElement('div');
            div.className = "tech-node growing-anim";
            div.innerHTML = `<img src="${LOGO_CAY}" class="mam-xanh-img"><div class="node-name">${item.hoten}</div><div class="node-role">Từ: ${item.donvi}</div>`;
            div.onclick = () => { 
                const modalImg = document.getElementById('modalImg');
                const dlBtn = document.getElementById('modalDownloadBtn');
                modalImg.src = item.imgData;
                
                // Gán chức năng tải cho nút trong modal
                dlBtn.onclick = (e) => {
                    e.stopPropagation(); // Ngăn modal đóng khi bấm nút tải
                    const link = document.createElement('a');
                    link.download = `HanhPhuc_${item.hoten}.jpg`;
                    link.href = item.imgData;
                    link.click();
                };
                new bootstrap.Modal(document.getElementById('treeModal')).show(); 
            };
            grid.appendChild(div);
        });
    }

    // TÍNH NĂNG GIEO HẠT + TỰ ĐỘNG TẢI VỀ
    async function addToGarden() {
        const sender = document.getElementById('inpSender').value;
        const receiver = document.getElementById('inpReceiver').value;
        if(!sender || !isAvatarLoaded) return alert("Vui lòng điền thông tin và tải ảnh chân dung!");
        
        // 1. Tự động tải về máy như ban đầu
        downloadImage();

        document.getElementById('loading').style.display = 'flex';
        const imgData = canvas.toDataURL('image/jpeg', 0.85);
        const newItem = { hoten: receiver, donvi: sender, imgData: imgData };
        
        // 2. Lưu lên database
        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newItem) });
        gardenData.unshift(newItem); 
        renderGarden();
        
        setTimeout(() => { 
            document.getElementById('loading').style.display = 'none'; 
            document.getElementById('garden-tab-btn').click(); 
        }, 1500);
    }

    async function autoSyncData() {
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL);
            const data = await res.json();
            if (parseInt(data.total) !== lastTotal) {
                lastTotal = data.total;
                document.getElementById('treeCount').innerText = lastTotal;
                gardenData = data.items.slice().reverse();
                renderGarden();
            }
        } catch (e) {}
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = `ThongDiep_${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    }

    document.querySelectorAll('input, textarea').forEach(el => el.oninput = update);
</script>
</body>
</html>
